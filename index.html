<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#121212">
    <title>Опупеністичний сайт</title>
    <script defer src="www/js/video.js"></script>
    <script defer src="www/js/interactive.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link rel="stylesheet" href="www/css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Animated background elements -->
<div class="wanted-poster" data-poster="1"></div>
<div class="wanted-poster" data-poster="2"></div>
<div class="bullet-holes"></div>

<!-- Main content container -->
<div class="saloon-container">
    <!-- Swinging sign -->
    <div class="saloon-sign">
        <div class="sign-board">
            <h1>Colton Bar</h1>
            <div class="sign-chain"></div>
        </div>
    </div>

    <!-- Logo with interactive shine -->
    <div class="logo-container">
        <img class="logo" src="www/img/ColtonBar%20Logo.png" alt="Saloon Logo" id="interactive-logo">
        <div class="logo-shine"></div>
    </div>

    <!-- Visitor counter with animated elements -->
    <div class="counter-container">
        <div class="counter-box">
            <p class="counter-label">Поточні клієнти:</p>
            <div class="counter-display">
                <span id="visitor-count">0</span><span>/20</span>
                <div class="counter-gears"></div>
            </div>
        </div>
        <div class="whiskey-bottle"></div>
    </div>

    <!-- Interactive bar items -->
    <div class="bar-items">
        <div class="piano-keys" id="piano"></div>
        <div class="beer-mug" id="beer-mug"></div>
        <div class="deck-cards" id="deck-cards"></div>
    </div>
</div>

<!-- Ambient sounds control -->
<div class="sound-control">
    <button id="sound-toggle">
        <span class="sound-icon">🔊</span>
        <span class="sound-text">Saloon Ambience</span>
    </button>
</div>

</body>
</html>
