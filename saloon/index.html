<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colton Bar - Салун</title>
    <script defer src="/www/js/lib/Tone.js"></script>
    <script defer src="/www/js/saloon.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="/www/css/style.css" rel="stylesheet">
    <link href="/www/css/saloon.css" rel="stylesheet">
</head>
<body>
    <!-- Фон салуну -->
    <div class="saloon-bg"></div>
    <div class="wood-texture"></div>

    <!-- Шапка салуну -->
    <header class="saloon-header">
        <h1>Colton Bar - Салун</h1>
    </header>

    <!-- Основний вміст -->
    <main class="saloon-main">
        <!-- Ліва колонка - барна стійка та столики -->
        <div class="saloon-content">
            <!-- Барна стійка -->
            <section class="bar-counter">
                <h2>Барна стійка</h2>

                <div class="drinks-menu">
                    <div class="drink-item">
                        <div class="drink-icon">🍺</div>
                        <div class="drink-name">Пиво</div>
                        <div class="drink-price">₴50</div>
                    </div>
                    <div class="drink-item">
                        <div class="drink-icon">🥃</div>
                        <div class="drink-name">Віскі</div>
                        <div class="drink-price">₴80</div>
                    </div>
                    <div class="drink-item">
                        <div class="drink-icon">🍷</div>
                        <div class="drink-name">Вино</div>
                        <div class="drink-price">₴70</div>
                    </div>
                    <div class="drink-item">
                        <div class="drink-icon">🍸</div>
                        <div class="drink-name">Коктейль</div>
                        <div class="drink-price">₴100</div>
                    </div>
                    <div class="drink-item">
                        <div class="drink-icon">🥤</div>
                        <div class="drink-name">Сік</div>
                        <div class="drink-price">₴40</div>
                    </div>
                    <div class="drink-item">
                        <div class="drink-icon">☕</div>
                        <div class="drink-name">Кава</div>
                        <div class="drink-price">₴45</div>
                    </div>
                </div>
            </section>

            <!-- Область зі столиками -->
            <section class="tables-area">
                <h2>Столики</h2>
                <div class="table table-1"></div>
                <div class="table table-2"></div>
                <div class="table table-3"></div>
                <div class="table table-4"></div>

                <div class="patron patron-1"></div>
                <div class="patron patron-2"></div>
                <div class="patron patron-3"></div>
                <div class="patron patron-4"></div>
            </section>
        </div>

        <!-- Права колонка - бічна панель -->
        <aside class="saloon-sidebar">
            <div class="active-patrons">
                <h2 class="patrons-title">Очікувані «Гості»</h2>
                <div class="patron-list">
                    <div class="patron-card">
                        <div class="wanted-frame">
                            <div class="patron-avatar" style="background-image: url('/www/img/wanted/пикми.png')"></div>
                            <div class="patron-name">«Я»</div>
                            <div class="patron-title">Головний ковбой</div>
                            <div class="patron-bounty">Нагорода: $5000</div>
                        </div>
                    </div>
                    <div class="patron-card">
                        <div class="wanted-frame">
                            <div class="patron-avatar" style="background-image: url('/www/img/wanted/солнце.png')"></div>
                            <div class="patron-name">Отец</div>
                            <div class="patron-title">Мисливці за душею</div>
                            <div class="patron-bounty">Нагорода: $1000</div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Ambient sounds control -->
        <div class="sound-control">
            <button id="sound-toggle">
                <span class="sound-icon">🔇</span>
                <span class="sound-text">Sound Off</span>
            </button>
        </div>
    </main>

    <!-- Підвал -->
    <footer class="saloon-footer">
        <p>© 2023 Colton Bar - Легендарний салун Дикого Заходу</p>
    </footer>

</body>
</html>
